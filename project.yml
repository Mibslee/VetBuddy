name: VetBuddy
options:
  bundleIdPrefix: com.shanestudio
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  VetBuddy:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: DesignSystem
      - path: Features
      - path: Assets.xcassets
      - path: Resources/Content/exercises.json
      - path: Resources/Content/nutrition_advice.json
      - path: Resources/PosterBackgrounds/poster_mountain.png
      - path: Resources/PosterBackgrounds/poster_bamboo.png
      - path: Resources/PosterBackgrounds/poster_pine.png
      - path: Resources/PosterBackgrounds/poster_crane.png
      - path: Resources/ExerciseIllustrations/sit_to_stand_sequence.png
      - path: Resources/ExerciseIllustrations/calf_raise_sequence.png
      - path: Resources/ExerciseIllustrations/wall_sit_sequence.png
      - path: Resources/ExerciseIllustrations/straight_leg_raise_sequence.png
      - path: Resources/ExerciseIllustrations/side_leg_raise_sequence.png
      - path: Resources/ExerciseIllustrations/glute_bridge_sequence.png
      - path: Resources/ExerciseIllustrations/standing_march_sequence.png
      - path: Resources/ExerciseIllustrations/tandem_walk_sequence.png
      - path: Resources/Voice/Generated
      - path: Resources/ExerciseVideos/calf_raise_pexels_32115656_preview.mp4
      - path: Resources/ExerciseVideos/video_sources.json
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: VetBuddy.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.shanestudio.VetBuddy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: VHL4P85M5X
        CODE_SIGN_STYLE: Automatic

  VetBuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/VetBuddyTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: VetBuddy
        embed: false
